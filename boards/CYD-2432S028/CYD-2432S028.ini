##################################### CYD MODELS ####################################################
[env:CYD-2432S028]
extends=CYD_base
build_flags =
	${CYD_base.build_flags}
	-DTFT_BL=21
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=16000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DTOUCH_CS=33
	-DDEVICE_NAME='"CYD-2432S028"'

[env:CYD-2USB]
extends=env:CYD-2432S028
build_flags = ${env:CYD-2432S028.build_flags} -DTFT_INVERSION_ON -DDEVICE_NAME='"CYD-2USB"'

[env:LAUNCHER_CYD-2USB]
extends=env:CYD-2432S028
board_build.partitions = custom_4Mb.csv
build_flags = ${env:CYD-2432S028.build_flags} ${env_light.build_flags}
lib_deps = ${env_light.lib_deps}

[env:CYD-2432W328C]
extends = CYD_base
build_flags = ${CYD_base.build_flags} -DTFT_INVERSION_ON -DTFT_BL=27 -DSPI_FREQUENCY=55000000 -DSPI_READ_FREQUENCY=20000000 -DSPI_TOUCH_FREQUENCY=2500000 -DHAS_CAPACITIVE_TOUCH=1 -DTOUCH_CS=-1 -DDEVICE_NAME='"CYD-2432W328C"'

[env:LAUNCHER_CYD-2432S028]
extends=env:CYD-2432S028
board_build.partitions = custom_4Mb.csv
build_flags = ${env:CYD-2432S028.build_flags} ${env_light.build_flags}
lib_deps = ${env_light.lib_deps}

[env:CYD-2432W328C_2]
extends = env:CYD-2432W328C
build_unflags = -DTFT_INVERSION_ON
-DDEVICE_NAME='"CYD-2432W328C_2"'

[env:LAUNCHER_CYD-2432W328C]
extends=env:CYD-2432W328C
board_build.partitions = custom_4Mb.csv
build_flags = ${env:CYD-2432W328C.build_flags} ${env_light.build_flags}
lib_deps = ${env_light.lib_deps}

[env:CYD-2432W328R-or-S024R]
extends = CYD_base
build_flags = ${CYD_base.build_flags} -DTFT_INVERSION_ON -DTFT_BL=27 -DTOUCH_OFFSET_ROTATION=1 -DSPI_FREQUENCY=55000000 -DSPI_READ_FREQUENCY=20000000 -DSPI_TOUCH_FREQUENCY=2500000 -DTOUCH_CS=33 -DTOUCH_CONFIG_INT_GPIO_NUM=36 -DDEVICE_NAME='"CYD-2432W328R-or-S024R"'

[env:LAUNCHER_CYD-2432W328R-or-S024R]
extends = env:CYD-2432W328R-or-S024R
board_build.partitions = custom_4Mb.csv
build_flags = ${env:CYD-2432W328R-or-S024R.build_flags} ${env_light.build_flags}
lib_deps = ${env_light.lib_deps}

[env:CYD-3248S035R]
extends=CYD35_base
build_flags = ${CYD35_base.build_flags} -DST7796_DRIVER=1 -DTFT_BL=27 -DTOUCH_OFFSET_ROTATION=1 -DSPI_FREQUENCY=55000000 -DSPI_READ_FREQUENCY=20000000 -DSPI_TOUCH_FREQUENCY=2500000 -DTOUCH_CS=33 -DTOUCH_CONFIG_INT_GPIO_NUM=36 -DDEVICE_NAME='"CYD-3248S035R"'

[env:LAUNCHER_CYD-3248S035R]
extends=env:CYD-3248S035R
board_build.partitions = custom_4Mb.csv
build_flags = ${env:CYD-3248S035R.build_flags} ${env_light.build_flags}
lib_deps = ${env_light.lib_deps}

[env:CYD-3248S035C]
extends = CYD35_base
build_flags = ${CYD35_base.build_flags} -DTFT_INVERSION_ON -DTOUCH_INVERTED=1 -DHAS_CAPACITIVE_TOUCH=1 -DTOUCH_GT911_I2C=1 -DGT911_SLAVE_ADDRESS_L=0x5D -DGT911_I2C_CONFIG_SDA_IO_NUM=33 -DGT911_I2C_CONFIG_SCL_IO_NUM=32 -DGT911_TOUCH_CONFIG_INT_GPIO_NUM=25 -DGT911_TOUCH_CONFIG_RST_GPIO_NUM=21 -DBOARD_TOUCH_INT=25 -DTOUCH_CS=-1 -DDEVICE_NAME='"CYD-3248S035C"'
build_unflags = -DUSE_TFT_eSPI_TOUCH=1
lib_deps = ${env.lib_deps} lewisxhe/SensorLib@0.3.4

[env:LAUNCHER_CYD-3248S035C]
extends=env:CYD-3248S035C
board_build.partitions = custom_4Mb.csv
build_flags = ${env:CYD-3248S035C.build_flags} ${env_light.build_flags}
lib_deps = ${env_light.lib_deps} lewisxhe/SensorLib@0.3.4

################################# END OF CYD MODELS ####################################################
